601097,-79.199715,"b",[[67,1]]],[13778870917,43.7601339,-79.1997537,"b",[[67,1]]],[13778870918,43.7601477,-79.1998011,"b",[[67,1]]],[13831214130,43.7574206,-79.2143149,"b",[[3,1]]],[13831214131,43.7572341,-79.2142305,"b",[[3,1]]]]}</script>
  <script>
    const data=JSON.parse(document.getElementById('routeData').textContent);
    document.title=data.title;
    document.getElementById('routeTitle').textContent=data.title;
    document.getElementById('routeStats').textContent=`${data.distance_km.toFixed(1)} km · arrows every 250 m`;

    const map=L.map('map',{zoomControl:false,preferCanvas:false,zoomAnimation:false,fadeAnimation:false,rotate:true,touchRotate:true,rotateControl:{position:'bottomright',closeOnZeroBearing:false}});
    L.control.zoom({position:'bottomright'}).addTo(map);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
    const rotatingPane=map.getPane('rotatePane')||map.getPane('mapPane');
    map.createPane('routePane',rotatingPane);map.getPane('routePane').style.zIndex=425;map.getPane('routePane').style.pointerEvents='none';
    map.createPane('nodePane',rotatingPane);map.getPane('nodePane').style.zIndex=450;map.getPane('nodePane').style.pointerEvents='none';

    // Keep the route in a GridLayer under the same rotating pane and transform
    // as the map tiles. Vector renderers redraw on a different animation frame
    // during combined pinch/rotate gestures and visibly drift until touchend.
    const RouteGridLayer=L.GridLayer.extend({
      initialize(points,options={}){L.GridLayer.prototype.initialize.call(this,{pane:'routePane',tileSize:256,opacity:1,updateWhenIdle:true,updateWhenZooming:false,keepBuffer:2,...options});this.points=points;},
      createTile(coords){
        const tile=L.DomUtil.create('canvas','phone-route-tile'),size=this.getTileSize(),ratio=Math.min(2,window.devicePixelRatio||1),origin=L.point(coords.x*size.x,coords.y*size.y);
        tile.width=size.x*ratio;tile.height=size.y*ratio;tile.style.width=`${size.x}px`;tile.style.height=`${size.y}px`;
        const context=tile.getContext('2d');context.scale(ratio,ratio);context.lineCap='round';context.lineJoin='round';context.beginPath();
        for(let index=0;index<this.points.length;index++){const point=this._map.project(this.points[index],coords.z).subtract(origin);if(index)context.lineTo(point.x,point.y);else context.moveTo(point.x,point.y);}
        context.strokeStyle='rgba(245,234,255,.82)';context.lineWidth=9;context.stroke();context.strokeStyle='rgba(124,58,237,.98)';context.lineWidth=6;context.stroke();
        return tile;
      }
    });
    new RouteGridLayer(data.route).addTo(map);
    map.fitBounds(L.latLngBounds(data.route),{paddingTopLeft:[24,92],paddingBottomRight:[24,45]});
    L.marker(data.route[0],{icon:L.divIcon({className:'start-icon',html:'<span></span>',iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map);

    function bearing(from,to){
      const p=Math.PI/180,lat1=from[0]*p,lat2=to[0]*p,dlon=(to[1]-from[1])*p;
      const y=Math.sin(dlon)*Math.cos(lat2),x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dlon);
      return (Math.atan2(y,x)*180/Math.PI+360)%360;
    }
    let travelled=0,nextGuide=250;
    for(let index=1;index<data.route.length;index++){
      const from=data.route[index-1],to=data.route[index],segment=map.distance(from,to);
      if(!segment)continue;
      while(travelled+segment>=nextGuide){
        const fraction=(nextGuide-travelled)/segment,point=[from[0]+(to[0]-from[0])*fraction,from[1]+(to[1]-from[1])*fraction];
        if(nextGuide%1000===0){const km=nextGuide/1000;L.marker(point,{interactive:false,icon:L.divIcon({className:'km-marker',html:`<span>${km} km</span>`,iconSize:[44,24],iconAnchor:[22,12]})}).addTo(map);}
        else{const angle=bearing(from,to);L.marker(point,{interactive:false,rotation:angle*Math.PI/180,rotateWithView:true,icon:L.divIcon({className:'route-arrow',html:'<span>↑</span>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map);}
        nextGuide+=250;
      }
      travelled+=segment;
    }

    const storageKey=`citystrides-phone-run:${data.run_id}`;
    function readSavedRun(){try{return JSON.parse(localStorage.getItem(storageKey)||'{}');}catch(error){return {};}}
    const savedRun=readSavedRun(),capturedNodeIds=new Set(Array.isArray(savedRun.captured)?savedRun.captured:[]);
    let runStarted=Boolean(savedRun.started||capturedNodeIds.size);
    function saveRun(){try{localStorage.setItem(storageKey,JSON.stringify({started:runStarted,captured:[...capturedNodeIds],updated_at:Date.now()}));}catch(error){/* Progress still works when storage is unavailable. */}}

    const PhoneNodeLayer=L.GridLayer.extend({
      initialize(nodes,options={}){
        L.GridLayer.prototype.initialize.call(this,{pane:'nodePane',tileSize:256,opacity:1,updateWhenIdle:true,updateWhenZooming:false,keepBuffer:2,...options});
        this.cell=.002;this.grid=new Map();this.items=new Map();
        for(const raw of nodes){const item={id:raw[0],lat:raw[1],lon:raw[2],status:capturedNodeIds.has(raw[0])?'g':raw[3],streets:raw[4]||[]},key=this.key(item.lat,item.lon);this.items.set(item.id,item);if(!this.grid.has(key))this.grid.set(key,[]);this.grid.get(key).push(item);}
      },
      key(lat,lon){return `${Math.floor(lat/this.cell)},${Math.floor(lon/this.cell)}`;},
      candidates(bounds){
        const result=[],south=Math.floor(bounds.getSouth()/this.cell),north=Math.floor(bounds.getNorth()/this.cell),west=Math.floor(bounds.getWest()/this.cell),east=Math.floor(bounds.getEast()/this.cell);
        for(let x=south;x<=north;x++)for(let y=west;y<=east;y++){const items=this.grid.get(`${x},${y}`);if(items)result.push(...items);}
        return result;
      },
      nearby(point,radiusMetres){
        const latDelta=radiusMetres/111195,lonDelta=latDelta/Math.max(.2,Math.cos(point[0]*Math.PI/180)),bounds=L.latLngBounds([point[0]-latDelta,point[1]-lonDelta],[point[0]+latDelta,point[1]+lonDelta]);
        return this.candidates(bounds).filter(node=>map.distance(point,[node.lat,node.lon])<=radiusMetres);
      },
      captureNear(point,radiusMetres){
        const captured=[];
        for(const node of this.nearby(point,radiusMetres))if(node.status!=='g'){node.status='g';captured.push(node);}
        if(captured.length)this.redraw();
        return captured;
      },
      createTile(coords){
        const tile=L.DomUtil.create('canvas','phone-node-tile'),size=this.getTileSize(),ratio=Math.min(2,window.devicePixelRatio||1),origin=L.point(coords.x*size.x,coords.y*size.y);
        tile.width=size.x*ratio;tile.height=size.y*ratio;tile.style.width=`${size.x}px`;tile.style.height=`${size.y}px`;
        const context=tile.getContext('2d');context.scale(ratio,ratio);
        const northwest=this._map.unproject(origin,coords.z),southeast=this._map.unproject(origin.add(size),coords.z),bounds=L.latLngBounds(northwest,southeast),radius=coords.z>=19?9:(coords.z>=18?8:(coords.z>=17?7:(coords.z>=16?6:(coords.z>=15?5:(coords.z>=13?4:3))))),visible=this.candidates(bounds),styles=[['b','#00d9ff'],['y','#ffe600'],['r','#ff1744'],['g','#39ff14']];
        for(const [status,color] of styles){context.beginPath();for(const node of visible){if(node.status!==status||!bounds.contains([node.lat,node.lon]))continue;const point=this._map.project([node.lat,node.lon],coords.z).subtract(origin);context.moveTo(point.x+radius,point.y);context.arc(point.x,point.y,radius,0,Math.PI*2);}context.fillStyle=color;context.fill();}
        return tile;
      }
    });
    const nodeLayer=new PhoneNodeLayer(data.nodes).addTo(map);
    L.control.layers(null,{'CityStrides nodes':nodeLayer},{collapsed:true,position:'topright'}).addTo(map);

    const locateButton=document.getElementById('locate'),gpsStatus=document.getElementById('gpsStatus'),completedNumber=document.getElementById('completedNumber'),capturedCount=document.getElementById('capturedCount'),streetProgress=document.getElementById('streetProgress');
    const capturedByStreet=Array(data.streets.length).fill(0),recentStreets=new Map();
    for(const id of [...capturedNodeIds]){const node=nodeLayer.items.get(id);if(!node){capturedNodeIds.delete(id);continue;}for(const [street,count] of node.streets)capturedByStreet[street]+=count;}
    function streetNodeCount(index){const street=data.streets[index];return Math.min(street.total,street.done+capturedByStreet[index]);}
    function streetPercentValue(index){const street=data.streets[index];return Math.min(100,100*streetNodeCount(index)/street.total);}
    function streetPercent(index){return streetPercentValue(index).toFixed(1);}
    function completedStreets(){return data.streets.reduce((total,street,index)=>total+Number(street.done+capturedByStreet[index]>=street.goal),0);}
    function renderProgress(active=[]){
      const completed=completedStreets();completedNumber.textContent=completed;capturedCount.textContent=`${capturedNodeIds.size} node${capturedNodeIds.size===1?'':'s'} captured`;
      const now=Date.now();for(const [index,time] of recentStreets)if(now-time>30000)recentStreets.delete(index);
      const byName=new Map();for(const index of new Set(active.length?active:recentStreets.keys())){const key=data.streets[index].name.trim().toLocaleLowerCase(),previous=byName.get(key);if(previous===undefined||streetPercentValue(index)>streetPercentValue(previous))byName.set(key,index);}
      const indices=[...byName.values()].sort((a,b)=>data.streets[a].name.localeCompare(data.streets[b].name)).slice(0,4);
      if(!indices.length){streetProgress.innerHTML=`<div class="progress-empty">${runStarted?'Head toward a CityStrides node to begin making progress.':'Start the run to track street progress.'}</div>`;return;}
      streetProgress.replaceChildren(...indices.map(index=>{const street=data.streets[index],line=document.createElement('div'),name=document.createElement('b'),value=document.createElement('span'),percent=document.createElement('span'),count=document.createElement('span'),complete=streetNodeCount(index)>=street.goal;line.className='street-line';name.textContent=street.name;percent.className='street-percent';percent.textContent=`${streetPercent(index)}%`;count.textContent=` (${streetNodeCount(index)}/${street.total})${complete?' ✓':''}`;value.append(percent,count);line.append(name,value);return line;}));
    }
    function captureProgress(nodes){
      if(!nodes.length)return;
      for(const node of nodes){capturedNodeIds.add(node.id);for(const [street,count] of node.streets){capturedByStreet[street]+=count;recentStreets.set(street,Date.now());}}
      saveRun();
    }
    function activeStreets(point){const active=new Set();for(const node of nodeLayer.nearby(point,35))if(node.status==='g')for(const [street] of node.streets)active.add(street);return [...active];}
    renderProgress();

    let watchId=null,userMarker=null,accuracyCircle=null,lastLocation=null,following=true;
    if(!window.isSecureContext&&location.protocol!=='file:')gpsStatus.textContent='Map ready · live location may require HTTPS';
    function updateFollowButton(){locateButton.textContent=watchId===null?(runStarted?'Resume run':'Start run'):(following?'Following':'Resume follow');}
    function locationSuccess(position){
      const point=[position.coords.latitude,position.coords.longitude];lastLocation=point;
      if(!userMarker){userMarker=L.marker(point,{pane:'markerPane',zIndexOffset:1000,icon:L.divIcon({className:'user-icon',html:'<span></span>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map);accuracyCircle=L.circle(point,{radius:position.coords.accuracy,color:'#2563eb',weight:1,fillColor:'#60a5fa',fillOpacity:.12}).addTo(map);}else{userMarker.setLatLng(point);accuracyCircle.setLatLng(point).setRadius(position.coords.accuracy);}
      const newlyCaptured=nodeLayer.captureNear(point,25);captureProgress(newlyCaptured);renderProgress(activeStreets(point));
      gpsStatus.textContent=`Run tracking · GPS accuracy ±${Math.round(position.coords.accuracy)} m${newlyCaptured.length?` · ${newlyCaptured.length} new node${newlyCaptured.length===1?'':'s'}`:''}`;
      if(following)map.panTo(point,{animate:true,duration:.5});
      updateFollowButton();
    }
    function locationError(error){gpsStatus.textContent=error.code===1?'Location permission was denied. Enable it in browser settings.':`Could not get location: ${error.message}`;watchId=null;updateFollowButton();}
    locateButton.addEventListener('click',()=>{
      if(!navigator.geolocation){gpsStatus.textContent='This browser does not provide live location.';return;}
      if(watchId===null){runStarted=true;saveRun();renderProgress();following=true;gpsStatus.textContent='Waiting for a precise GPS fix…';watchId=navigator.geolocation.watchPosition(locationSuccess,locationError,{enableHighAccuracy:true,maximumAge:1500,timeout:20000});}
      else{following=true;if(lastLocation)map.panTo(lastLocation,{animate:true});}
      updateFollowButton();
    });
    map.on('dragstart',()=>{if(watchId!==null){following=false;updateFollowButton();}});
    updateFollowButton();
  </script>
