      return (Math.atan2(y,x)*180/Math.PI+360)%360;
    }
    let travelled=0,nextArrow=250;
    for(let index=1;index<data.route.length;index++){
      const from=data.route[index-1],to=data.route[index],segment=map.distance(from,to);
      if(!segment)continue;
      while(travelled+segment>=nextArrow){
        const fraction=(nextArrow-travelled)/segment,point=[from[0]+(to[0]-from[0])*fraction,from[1]+(to[1]-from[1])*fraction],angle=bearing(from,to);
        L.marker(point,{interactive:false,icon:L.divIcon({className:'route-arrow',html:`<span style="transform:rotate(${angle}deg)">↑</span>`,iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map);
        nextArrow+=250;
      }
      travelled+=segment;
    }

    const PhoneNodeLayer=L.GridLayer.extend({
      initialize(nodeGroups,options={}){
        L.GridLayer.prototype.initialize.call(this,{pane:'nodePane',tileSize:256,opacity:1,updateWhenIdle:true,updateWhenZooming:false,keepBuffer:2,...options});
        this.cell=.01;this.grid=new Map();
        for(const [status,points] of Object.entries(nodeGroups))for(const point of points){const item={lat:point[0],lon:point[1],status},key=this.key(item.lat,item.lon);if(!this.grid.has(key))this.grid.set(key,[]);this.grid.get(key).push(item);}
      },
      key(lat,lon){return `${Math.floor(lat/this.cell)},${Math.floor(lon/this.cell)}`;},
      candidates(bounds){
        const result=[],south=Math.floor(bounds.getSouth()/this.cell),north=Math.floor(bounds.getNorth()/this.cell),west=Math.floor(bounds.getWest()/this.cell),east=Math.floor(bounds.getEast()/this.cell);
        for(let x=south;x<=north;x++)for(let y=west;y<=east;y++){const items=this.grid.get(`${x},${y}`);if(items)result.push(...items);}
        return result;
      },
      createTile(coords){
        const tile=L.DomUtil.create('canvas','phone-node-tile'),size=this.getTileSize(),ratio=Math.min(2,window.devicePixelRatio||1),origin=L.point(coords.x*size.x,coords.y*size.y);
        tile.width=size.x*ratio;tile.height=size.y*ratio;tile.style.width=`${size.x}px`;tile.style.height=`${size.y}px`;
        const context=tile.getContext('2d');context.scale(ratio,ratio);
        const northwest=this._map.unproject(origin,coords.z),southeast=this._map.unproject(origin.add(size),coords.z),bounds=L.latLngBounds(northwest,southeast),radius=coords.z>=16?4.8:(coords.z>=13?3.8:2.4),visible=this.candidates(bounds),styles=[['blue','#00d9ff'],['yellow','#ffe600'],['red','#ff1744']];
        for(const [status,color] of styles){context.beginPath();for(const node of visible){if(node.status!==status||!bounds.contains([node.lat,node.lon]))continue;const point=this._map.project([node.lat,node.lon],coords.z).subtract(origin);context.moveTo(point.x+radius,point.y);context.arc(point.x,point.y,radius,0,Math.PI*2);}context.fillStyle=color;context.fill();}
        return tile;
      }
    });
    const nodeLayer=new PhoneNodeLayer(data.nodes).addTo(map);
    const legend=L.control({position:'bottomleft'});
    legend.onAdd=()=>{const element=L.DomUtil.create('div','legend');element.innerHTML='<div><i class="dot" style="background:#00d9ff"></i>Remaining nearby</div><div><i class="dot" style="background:#ff1744"></i>Reached by route</div><div><i class="dot" style="background:#ffe600"></i>Allowed by 90% rule</div>';return element;};
    legend.addTo(map);
    L.control.layers(null,{'CityStrides nodes':nodeLayer},{collapsed:true,position:'topright'}).addTo(map);

    const locateButton=document.getElementById('locate'),gpsStatus=document.getElementById('gpsStatus');
    let watchId=null,userMarker=null,accuracyCircle=null,lastLocation=null,following=true;
    if(!window.isSecureContext&&location.protocol!=='file:')gpsStatus.textContent='Map ready · live location may require HTTPS';
    function updateFollowButton(){locateButton.textContent=watchId===null?'Locate me':(following?'Following':'Resume follow');}
    function locationSuccess(position){
      const point=[position.coords.latitude,position.coords.longitude];lastLocation=point;
      if(!userMarker){userMarker=L.marker(point,{pane:'locationPane',zIndexOffset:1000,icon:L.divIcon({className:'user-icon',html:'<span></span>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map);accuracyCircle=L.circle(point,{pane:'routePane',radius:position.coords.accuracy,color:'#2563eb',weight:1,fillColor:'#60a5fa',fillOpacity:.12}).addTo(map);}else{userMarker.setLatLng(point);accuracyCircle.setLatLng(point).setRadius(position.coords.accuracy);}
      gpsStatus.textContent=`You are here · GPS accuracy ±${Math.round(position.coords.accuracy)} m`;
      if(following)map.panTo(point,{animate:true,duration:.5});
      updateFollowButton();
    }
    function locationError(error){gpsStatus.textContent=error.code===1?'Location permission was denied. Enable it in browser settings.':`Could not get location: ${error.message}`;watchId=null;updateFollowButton();}
    locateButton.addEventListener('click',()=>{
      if(!navigator.geolocation){gpsStatus.textContent='This browser does not provide live location.';return;}
      if(watchId===null){following=true;gpsStatus.textContent='Waiting for a precise GPS fix…';watchId=navigator.geolocation.watchPosition(locationSuccess,locationError,{enableHighAccuracy:true,maximumAge:1500,timeout:20000});}
      else{following=true;if(lastLocation)map.panTo(lastLocation,{animate:true});}
      updateFollowButton();
    });
    map.on('dragstart',()=>{if(watchId!==null){following=false;updateFollowButton();}});
  </script>
</body>
</html>
