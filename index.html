  <title>Upcoming runs</title>
  <style>
    :root { color-scheme:dark; --ink:#f6f3ea; --muted:#a9ada5; --panel:#181c18; --line:#343a34; --lime:#b8ff55; --purple:#9b6cff; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; background:radial-gradient(circle at 75% 0,#30204c 0,transparent 34rem),#101310; color:var(--ink); font:15px/1.5 ui-sans-serif,system-ui,sans-serif; }
    main { width:min(900px,calc(100% - 32px)); margin:0 auto; padding:clamp(48px,9vw,100px) 0; }
    .eyebrow { color:var(--lime); font-size:12px; font-weight:850; letter-spacing:.13em; text-transform:uppercase; }
    h1 { margin:8px 0 6px; font-size:clamp(38px,8vw,68px); line-height:1; letter-spacing:-.055em; }
    header p { max-width:580px; margin:0; color:var(--muted); font-size:16px; }
    .page-link { display:inline-block; margin-top:12px; color:var(--lime); font-weight:800; text-decoration:none; }
    .runs { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:14px; margin-top:38px; }
    .run { display:grid; grid-template-columns:1fr auto; gap:7px 14px; min-height:132px; padding:20px; border:1px solid var(--line); border-radius:15px; background:rgba(24,28,24,.92); color:inherit; text-decoration:none; box-shadow:0 12px 30px rgba(0,0,0,.18); transition:transform .15s ease,border-color .15s ease; }
    .run:hover { transform:translateY(-2px); border-color:var(--purple); }
    .run strong { font-size:20px; letter-spacing:-.02em; }
    .run span { color:var(--lime); font-size:18px; font-weight:850; }
    .run small { grid-column:1/-1; align-self:end; overflow-wrap:anywhere; color:var(--muted); }
    .empty { grid-column:1/-1; padding:28px; border:1px dashed var(--line); border-radius:15px; color:var(--muted); text-align:center; }
  </style>
</head>
